<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">

    <title>AlcoPop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 20px;  
        }
        #datePicker {
            width: 230px; /* Adjust this value based on your needs */
        }
        .tally_count {
            font-size:larger;
            font-weight: bolder;
        }
        .container {
            width: 100%;      // Take up the full width
            max-width: none;  // Remove any max width
            margin: 0 auto;   // Centering (if needed)
            padding: 5% 5%;   // Add padding to avoid content sticking to the edges
        }
        .quick-add-buttons {
            display: flex;
            justify-content: space-between;
            flex-wrap: nowrap;  /* Prevent wrapping onto the next line */
        }
        .quick-add-buttons button {
            flex: 1;  /* Makes each button grow equally */
            text-align: center;  /* Center the button text */
            height: 80px;  /* Increase this value to adjust the height */
            line-height: 80px;  /* To vertically center text inside the button */
            font-size: larger;
            margin: 0;
            border:thin 1px;  
            box-sizing: border-box;  /* Ensures padding and border are included in width/height */
        }

        /* This ensures no additional styles are being applied to the buttons on mobile */
        button::-moz-focus-inner {
            border: 0;
            padding: 0;
            margin: 0;
        }
        .day_btn {
            font-size: 1.5em;
            font-weight: bolder;
        }
        
        /* Adjust the margin for the first and last buttons */
        .quick-add-buttons button:first-child {
            margin-left: 0;
        }

        .quick-add-buttons button:last-child {
            margin-right: 0;
        }
        
        .drinks-list {
            overflow-y: auto;
            height: 75vh; /* Adjust this for your needs */
            border: 1px solid #ccc;
        }
        .drink {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }
        /* Transition effects */
        .drink, .quick-add-buttons button {
            transition: background-color 0.3s;
        }

        /* Toast/Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            z-index: 1000;
        }
        .toggle-container {
            position: relative;
            width: 60px;
            height: 30px;
        }

        .toggle-switch {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 30px;
            transition: 0.4s;
        }

        .toggle-switch:before {
            position: absolute;
            content: "+/-";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s;
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background-color: #2196F3;
        }

        input[type="checkbox"]:checked + .toggle-switch:before {
            transform: translateX(30px);
        }

        .toggle-labels {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .toggle-labels span {
            cursor: pointer;
        }

        /* Responsiveness */
        @media only screen and (max-width: 480px) {
            body {
                font-size: 18px; /* Larger font for mobile */
            }

            .quick-add-buttons button {
                padding: 15px;
                margin: 10px;
            }

            .drink {
                padding: 15px;
            }
        }        
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: center; align-items: center; margin: 10px 0;">
        <button class="day_btn" onclick="changeDate(-1)">‹</button>
        <input type="date" id="datePicker" style="font-size: 1.5em; margin: 0 10px;" onchange="loadDateTally()">
        <button class="day_btn" onclick="changeDate(1)">›</button>
    </div>
    
    <!-- Slider and Tally (TODO: https://www.tutorialstonight.com/css-toggle-switch-with-text?expand_article=1)-->
    <div style="display: flex; justify-content: space-between; margin: 10px 0;">
        <div class="toggle-container">
            <input type="checkbox" id="toggle" checked>
            <label for="toggle" class="toggle-switch"></label>
        </div>
        <span class="tally_count" id="tally">0</span>
    </div>

    <!-- Quick-Add Buttons -->
    <div class="quick-add-buttons">
        <button onclick="addToTally(5)">5</button>
        <button onclick="addToTally(10)">10</button>
        <button onclick="addToTally(20)">20</button>
        <button onclick="addToTally(60)">60</button>
        <button onclick="addToTally(80)">80</button>
    </div>

    <!-- Scrolling List of Drinks -->
    <div class="drinks-list" id="drinkList"></div>
</div>
<div class="toast" id="toast"></div>
<a href="#" id="shareableLink">Copy Shareable Link</a>

<script>
    const tallyDisplay = document.getElementById('tally');
    const drinkList = document.getElementById('drinkList');
    let totalAlcoholUnits = 0;

    const datePicker = document.getElementById('datePicker');
    datePicker.value = getDateString(new Date());
    let selectedDate = datePicker.value;

    // Key format: 'totalAlcoholUnits-YYYY-MM-DD'
    function getDateString(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }
    
    function changeDate(delta) {
        const currentDate = new Date(datePicker.value + 'T00:00:00'); // force local midnight
        currentDate.setDate(currentDate.getDate() + delta);
        selectedDate = getDateString(currentDate); 
        datePicker.value = selectedDate;
        loadDateTally();
    }
    
    function loadDateTally() {
        totalAlcoholUnits = parseInt(localStorage.getItem('totalAlcoholUnits-' + selectedDate) || "0", 10);
        updateDisplay();
    }

    // Listen for date picker changes
    datePicker.addEventListener('change', () => {
        selectedDate = datePicker.value;
        loadDateTally();
    });

    // On page load
    document.addEventListener('DOMContentLoaded', (event) => {
        datePicker.value = selectedDate;
        deserializeURLParamsToData();
        loadDateTally();
        // Sync settings UI lives in divs after this script tag; defer its
        // first init until the DOM is ready so getElementById succeeds.
        initSyncSettings();
    });
    
    function addToTally(alcoholContent) {
        let toggle = document.getElementById('toggle');
        
        if (toggle.checked) { // Add
            totalAlcoholUnits += alcoholContent;
        } else { // Subtract
            totalAlcoholUnits -= alcoholContent;
            totalAlcoholUnits = Math.max(0, totalAlcoholUnits); // Ensure tally doesn't go negative
        }
 
        // Save to localStorage with date-specific key
        localStorage.setItem('totalAlcoholUnits-' + selectedDate, totalAlcoholUnits);

        // Sync to Cloudflare KV for ClawdBot integration
        syncToCloud(selectedDate, totalAlcoholUnits).then(updateSyncIndicator);
        const serializedData = serializeDataToURLParams();
        window.history.pushState({}, '', '?' + serializedData);
        updateShareableLink();        
        updateDisplay();
        
        let operationMsg = toggle.checked ? "Added" : "Subtracted";
        showToast(`${operationMsg} ${alcoholContent} units`);
    }

    function updateDisplay() {
        const localVal = localStorage.getItem('totalAlcoholUnits-' + selectedDate);
        if (localVal !== null) {
            totalAlcoholUnits = parseInt(localVal) || 0;
            tallyDisplay.innerText = totalAlcoholUnits.toString();
        } else {
            // Fallback: try loading from cloud KV backup
            totalAlcoholUnits = 0;
            tallyDisplay.innerText = '0';
            const readToken = localStorage.getItem('alco_sync_token');
            fetch('https://nearby-bmosher.pages.dev/alco?date=' + selectedDate + '&token=' + (readToken || ''))
                .then(r => r.json())
                .then(data => {
                    if (data.units > 0) {
                        totalAlcoholUnits = data.units;
                        localStorage.setItem('totalAlcoholUnits-' + selectedDate, data.units);
                        tallyDisplay.innerText = data.units.toString();
                    }
                })
                .catch(() => {});
        }
        if (typeof updateSyncIndicator === 'function') updateSyncIndicator();
    }

    function updateShareableLink() {
        const linkElement = document.getElementById('shareableLink');
        linkElement.href = window.location.href;
        linkElement.textContent = window.location.href;
    }

    function serializeDataToURLParams() {
        let dates = [];
        let values = [];
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('totalAlcoholUnits-')) {
                dates.push(key.split('-')[1]);
                values.push(localStorage.getItem(key));
            }
        }
        
        const serializedData = {
            dates: dates.join(','),
            values: values.join(',')
        };

        // Convert the serializedData object to a JSON string and then encode with Base64
        const encodedData = btoa(JSON.stringify(serializedData));
        return 'data=' + encodedData;
    }

    function deserializeURLParamsToData() {
        const params = new URLSearchParams(window.location.search);
        const encodedData = params.get('data');
        
        console.debug(encodedData);
        if (encodedData) {
            const decodedString = atob(encodedData);
            const deserializedData = JSON.parse(decodedString);
            console.debug(deserializedData);
            
            const dates = deserializedData.dates.split(',');
            const values = deserializedData.values.split(',');
            
            for (let i = 0; i < dates.length; i++) {
                const key = 'totalAlcoholUnits-' + dates[i];
                localStorage.setItem(key, values[i]);
            }
        }
    }

    // Sample data for drinks. In a real application, this would be fetched from a database or API.
    const drinks = [
        {name: 'Beer - 12 oz - 4%', value: 48},
        {name: 'Beer - 12 oz - 5%', value: 60},
        {name: 'Beer - 12 oz - 6%', value: 72},
        {name: 'Beer - 12 oz - 7%', value: 84},
        {name: 'Beer - 16 oz - 4%', value: 64},
        {name: 'Beer - 16 oz - 5%', value: 80},
        {name: 'Beer - 16 oz - 6%', value: 96},
        {name: 'Beer - 16 oz - 7%', value: 112},
        {name: 'Wine - 5 oz - 11%', value: 55},
        {name: 'Wine - 5 oz - 12%', value: 60},
        {name: 'Wine - 5 oz - 13%', value: 65},
        {name: 'Highball', value: 80},
        {name: 'Sour', value: 80},
        {name: 'Negroni', value: 80},
        {name: 'Old-Fashioned', value: 90},
        {name: 'Manhattan', value: 110}
    ];

    // Populate the drink list
    drinks.forEach(drink => {
        const drinkElem = document.createElement('div');
        drinkElem.className = 'drink';
        drinkElem.innerHTML = `${drink.name} <span>(${drink.value})</span>`;
        drinkElem.addEventListener('click', () => {
            addToTally(drink.value);
            drinkElem.style.backgroundColor = '#f0f0f0'; // color feedback
            setTimeout(() => {
            drinkElem.style.backgroundColor = ''; // reset color after a delay
            }, 300);
        });

        drinkList.appendChild(drinkElem);
    });

    const toast = document.getElementById('toast');

    function showToast(message) {
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.bottom = '50px';

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.bottom = '20px';
        }, 2000);
    }

    if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js');
            });
    }

    // ── Cloud sync (Cloudflare KV) ──

    const APP_VERSION = '2026-04-18b';

    // Push one date/units pair to KV, tracking per-date sync status in
    // localStorage. Returns {status: 'synced'|'failed'|'no-token', error?}.
    function syncToCloud(date, units) {
        const token = localStorage.getItem('alco_sync_token');
        if (!token) return Promise.resolve({ status: 'no-token' });
        const mark = (status, error) => {
            localStorage.setItem('sync-status-' + date, status);
            localStorage.setItem('sync-status-' + date + '-at', new Date().toISOString());
            if (error) localStorage.setItem('sync-status-' + date + '-err', error);
            else localStorage.removeItem('sync-status-' + date + '-err');
        };
        return fetch('https://nearby-bmosher.pages.dev/alco', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Alco-Token': token },
            body: JSON.stringify({ date: date, units: units }),
        }).then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            mark('synced');
            return { status: 'synced' };
        }).catch(err => {
            mark('failed', String(err.message || err));
            return { status: 'failed', error: String(err.message || err) };
        });
    }

    // Push EVERY local dated entry whether or not it's been synced before.
    // Good recovery path when a run of days silently failed to sync.
    async function forceSyncAll() {
        const token = localStorage.getItem('alco_sync_token');
        if (!token) { alert('No sync token set — save one first.'); return; }
        const entries = [];
        for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (!k || !k.startsWith('totalAlcoholUnits-')) continue;
            const date = k.substring('totalAlcoholUnits-'.length);
            const units = parseInt(localStorage.getItem(k)) || 0;
            if (units > 0) entries.push({ date, units });
        }
        entries.sort((a, b) => a.date.localeCompare(b.date));
        const btn = document.getElementById('force-sync-btn');
        if (btn) btn.disabled = true;
        let ok = 0, fail = 0;
        for (const e of entries) {
            const r = await syncToCloud(e.date, e.units);
            if (r.status === 'synced') ok++; else fail++;
            if (btn) btn.textContent = `Syncing… ${ok + fail}/${entries.length}`;
        }
        if (btn) { btn.disabled = false; btn.textContent = 'Force sync all'; }
        updateSyncIndicator();
        alert(`Force sync complete: ${ok} synced, ${fail} failed (of ${entries.length} local entries with units > 0)`);
    }

    // Show sync status for the currently selected date.
    function updateSyncIndicator() {
        const el = document.getElementById('sync-indicator');
        if (!el) return;
        const token = localStorage.getItem('alco_sync_token');
        if (!token) { el.innerHTML = '<span style="color:#999">📱 Local only</span>'; return; }
        const status = localStorage.getItem('sync-status-' + selectedDate);
        const at = localStorage.getItem('sync-status-' + selectedDate + '-at');
        const err = localStorage.getItem('sync-status-' + selectedDate + '-err');
        const when = at ? ' (' + new Date(at).toLocaleTimeString() + ')' : '';
        if (status === 'synced') {
            el.innerHTML = '<span style="color:#0a0">☁️ Synced' + when + '</span>';
        } else if (status === 'failed') {
            el.innerHTML = '<span style="color:#c00" title="' + (err || '') + '">⚠️ Sync failed' + when + ' — tap Force sync</span>';
        } else {
            // never attempted for this date in this browser
            el.innerHTML = '<span style="color:#999">☁️ Not yet synced today</span>';
        }
    }

    // Ask the registered SW to check for an updated version.
    async function checkForUpdates() {
        if (!('serviceWorker' in navigator)) { alert('Service worker not supported'); return; }
        const reg = await navigator.serviceWorker.getRegistration();
        if (!reg) { alert('No service worker registered yet'); return; }
        await reg.update();
        if (reg.waiting) {
            reg.waiting.postMessage('SKIP_WAITING');
            alert('New version installed — reloading…');
            location.reload();
        } else {
            alert('You are on the latest version (' + APP_VERSION + ').');
        }
    }

    // Sync token setup
    function initSyncSettings() {
        const token = localStorage.getItem('alco_sync_token');
        const el = document.getElementById('sync-settings');
        if (token) {
            el.innerHTML =
                '<div style="display:flex;flex-direction:column;gap:6px;align-items:center">' +
                '<span style="color:#999;font-size:11px">☁️ Cloud sync active <a href="#" onclick="clearSyncToken();return false" style="color:#999">clear</a></span>' +
                '<div style="font-size:11px;color:#999">' +
                '<button id="force-sync-btn" onclick="forceSyncAll()" style="font-size:11px">Force sync all</button> ' +
                '<button onclick="checkForUpdates()" style="font-size:11px">Check for updates</button> ' +
                '<span style="color:#ccc">v' + APP_VERSION + '</span>' +
                '</div>' +
                '</div>';
        } else {
            el.innerHTML = '<div style="margin-top:20px;font-size:13px;color:#666">' +
                'Cloud sync: <input type="password" id="sync-token-input" placeholder="Enter sync token" style="font-size:13px;width:180px"> ' +
                '<button onclick="saveSyncToken()" style="font-size:13px">Save</button></div>';
        }
        updateSyncIndicator();
    }
    function saveSyncToken() {
        const val = document.getElementById('sync-token-input').value.trim();
        if (val) {
            localStorage.setItem('alco_sync_token', val);
            initSyncSettings();
            showToast('Sync token saved');
        }
    }
    function clearSyncToken() {
        localStorage.removeItem('alco_sync_token');
        initSyncSettings();
        showToast('Sync token cleared');
    }

</script>

<div id="sync-indicator" style="text-align:center;margin:8px 0;font-size:12px"></div>
<div id="sync-settings" style="text-align:center;margin:20px 0"></div>

</body>
</html>
